<!doctype html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>HomeLab CRM - Real Estate Office</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="HomeLab" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <script>
    document.addEventListener('gesturestart', function (e) {
      e.preventDefault();
    });

    // Generatore dinamico di Icona con sfondo personalizzato (#1B343F) per iOS/Android Home Screen
    (function() {
      const bgColor = '#1B343F';
      const canvas = document.createElement('canvas');
      canvas.width = 180;
      canvas.height = 180;
      const ctx = canvas.getContext('2d');
      
      // Sfondo solido color #1B343F
      ctx.fillStyle = bgColor;
      ctx.fillRect(0, 0, 180, 180);
      
      // Disegna un'icona stilizzata a forma di casa
      ctx.strokeStyle = '#FFFFFF';
      ctx.lineWidth = 10;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      
      // Tetto e mura
      ctx.beginPath();
      ctx.moveTo(90, 45); // Vertice tetto
      ctx.lineTo(40, 85); // Sinistra tetto
      ctx.lineTo(55, 85); // Allineamento muro
      ctx.lineTo(55, 135); // Muro sinistro
      ctx.lineTo(125, 135); // Muro destro
      ctx.lineTo(125, 85); // Allineamento muro
      ctx.lineTo(140, 85); // Destra tetto
      ctx.closePath();
      ctx.stroke();
      
      // Porta
      ctx.beginPath();
      ctx.moveTo(80, 135);
      ctx.lineTo(80, 105);
      ctx.lineTo(100, 105);
      ctx.lineTo(100, 135);
      ctx.stroke();
      
      const dataUrl = canvas.toDataURL('image/png');
      
      // Aggiorna apple-touch-icon
      let appleLink = document.querySelector('link[rel="apple-touch-icon"]');
      if (appleLink) {
        appleLink.href = dataUrl;
      }
    })();
  </script>
</head>

<body>
  <!-- Root entry point for React application -->
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
